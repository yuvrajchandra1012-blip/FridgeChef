<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FridgeChef — High-Protein Recipes from What You Have</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3148;
      --accent: #4ade80;
      --accent-hover: #22c55e;
      --text: #e8eaf0;
      --text-muted: #7c8099;
      --user-bubble: #1e3a5f;
      --user-bubble-border: #2d5a8e;
      --error: #f87171;
      --error-bg: #2d1515;
      --cal-color: #fb923c;
      --protein-color: #60a5fa;
      --fiber-color: #4ade80;
      --carbs-color: #a78bfa;
      --fat-color: #94a3b8;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    #header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    #header .logo { display: flex; align-items: center; gap: 10px; }
    #header .logo-icon { font-size: 22px; line-height: 1; }

    #header .logo-text h1 {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.2;
    }

    #header .logo-text h1 span { color: var(--accent); }
    #header .logo-text p { font-size: 11px; color: var(--text-muted); }

    .powered-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
    }

    /* ── Toolbar ── */
    #toolbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 9px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .filter-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
    }

    .filter-btn {
      background: var(--bg);
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 11px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active {
      background: rgba(74, 222, 128, 0.1);
      border-color: var(--accent);
      color: var(--accent);
      font-weight: 600;
    }

    .calorie-group {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-shrink: 0;
    }

    .calorie-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
      cursor: pointer;
    }

    .calorie-input {
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 13px;
      font-family: inherit;
      width: 90px;
      outline: none;
      transition: border-color 0.15s;
      -moz-appearance: textfield;
    }
    .calorie-input:focus { border-color: var(--accent); }
    .calorie-input::placeholder { color: var(--text-muted); }
    .calorie-input::-webkit-inner-spin-button,
    .calorie-input::-webkit-outer-spin-button { -webkit-appearance: none; }

    .calorie-unit {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ── Chat ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .message { display: flex; flex-direction: column; max-width: 80%; }
    .message.user      { align-self: flex-end;   align-items: flex-end; }
    .message.assistant { align-self: flex-start; align-items: flex-start; }
    .message.error     { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      line-height: 1.65;
      word-break: break-word;
    }

    .message.user .bubble {
      background: var(--user-bubble);
      border: 1px solid var(--user-bubble-border);
      border-bottom-right-radius: 4px;
    }

    .message.assistant .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .message.error .bubble {
      background: var(--error-bg);
      border: 1px solid #7f1d1d;
      border-bottom-left-radius: 4px;
      color: var(--error);
      font-size: 13px;
    }

    .bubble strong { font-weight: 700; color: var(--accent); }
    .bubble em     { font-style: italic; color: var(--text-muted); }
    .bubble ul     { padding-left: 18px; margin: 6px 0; }
    .bubble ol     { padding-left: 18px; margin: 6px 0; }
    .bubble li     { margin: 3px 0; }
    .bubble p      { margin: 6px 0; }
    .bubble p:first-child { margin-top: 0; }
    .bubble p:last-child  { margin-bottom: 0; }

    .macros-line {
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      color: var(--accent);
      background: rgba(74, 222, 128, 0.07);
      border: 1px solid rgba(74, 222, 128, 0.2);
      border-radius: 6px;
      padding: 5px 10px;
      margin: 6px 0 2px;
      display: inline-block;
      letter-spacing: 0.02em;
    }

    /* ── Recipe Cards ── */
    .recipe-response {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      align-self: stretch;
    }

    .recipe-intro {
      font-size: 14px;
      color: var(--text-muted);
      font-style: italic;
      padding: 0 2px;
    }

    .recipe-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    .recipe-card-header {
      padding: 15px 18px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .recipe-title-block { flex: 1; min-width: 0; }

    .recipe-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.3;
    }

    .recipe-servings {
      display: inline-block;
      margin-top: 4px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 2px 8px;
    }

    .copy-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    .copy-btn.copied {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(74, 222, 128, 0.1);
    }

    .recipe-why {
      padding: 10px 18px;
      font-size: 13px;
      color: var(--text-muted);
      font-style: italic;
      border-bottom: 1px solid var(--border);
      line-height: 1.5;
    }
    .recipe-why::before { content: '✦ '; color: var(--accent); font-style: normal; font-size: 10px; }

    .recipe-body {
      display: grid;
      grid-template-columns: 1fr 1.6fr;
    }

    .recipe-section { padding: 14px 18px; }

    .recipe-section:first-child {
      border-right: 1px solid var(--border);
    }

    .recipe-section h4 {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .recipe-section ul {
      list-style: none;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .recipe-section ul li {
      font-size: 13px;
      line-height: 1.45;
      padding-left: 12px;
      position: relative;
    }
    .recipe-section ul li::before {
      content: '·';
      position: absolute;
      left: 0;
      color: var(--accent);
      font-size: 16px;
      line-height: 1;
      top: 1px;
    }

    .recipe-section ol {
      padding-left: 18px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .recipe-section ol li {
      font-size: 13px;
      line-height: 1.5;
      padding-left: 2px;
    }
    .recipe-section ol li::marker { color: var(--accent); font-weight: 700; }

    .macros-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 11px 18px;
      background: var(--surface2);
      border-top: 1px solid var(--border);
    }

    .macro-pill {
      font-size: 12px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 12px;
      white-space: nowrap;
    }
    .macro-pill.cal     { background: rgba(251,146,60,.1);  border: 1px solid rgba(251,146,60,.3);  color: var(--cal-color); }
    .macro-pill.protein { background: rgba(96,165,250,.1);  border: 1px solid rgba(96,165,250,.3);  color: var(--protein-color); }
    .macro-pill.fiber   { background: rgba(74,222,128,.08); border: 1px solid rgba(74,222,128,.25); color: var(--fiber-color); }
    .macro-pill.carbs   { background: rgba(167,139,250,.1); border: 1px solid rgba(167,139,250,.3); color: var(--carbs-color); }
    .macro-pill.fat     { background: rgba(148,163,184,.1); border: 1px solid rgba(148,163,184,.3); color: var(--fat-color); }

    /* Typing indicator */
    .typing-indicator { display: flex; align-items: center; gap: 4px; padding: 14px 16px; }
    .typing-indicator span {
      width: 7px; height: 7px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%            { transform: translateY(-6px); opacity: 1; }
    }

    /* Welcome screen */
    #welcome { text-align: center; padding: 40px 20px; color: var(--text-muted); }
    #welcome .welcome-icon { font-size: 48px; margin-bottom: 12px; }
    #welcome h2 { color: var(--text); font-size: 20px; margin-bottom: 8px; }
    #welcome p  { font-size: 14px; max-width: 360px; margin: 0 auto 20px; }

    #welcome .examples {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center; max-width: 480px; margin: 0 auto;
    }

    .example-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      color: var(--text-muted);
    }
    .example-chip:hover { border-color: var(--accent); color: var(--text); }

    /* ── Input bar ── */
    #input-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #user-input {
      flex: 1;
      background: var(--bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      min-height: 42px;
      max-height: 96px;
      outline: none;
      transition: border-color 0.15s;
      line-height: 1.5;
    }
    #user-input:focus        { border-color: var(--accent); }
    #user-input::placeholder { color: var(--text-muted); }

    #send-btn {
      background: var(--accent);
      color: #0a0f0a;
      border: none;
      border-radius: 10px;
      width: 42px; height: 42px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
    }
    #send-btn:hover    { background: var(--accent-hover); }
    #send-btn:active   { transform: scale(0.95); }
    #send-btn:disabled { background: var(--surface2); cursor: not-allowed; }
    #send-btn svg      { width: 18px; height: 18px; }

    @media (max-width: 600px) {
      .message { max-width: 92%; }
      .recipe-body { grid-template-columns: 1fr; }
      .recipe-section:first-child { border-right: none; border-bottom: 1px solid var(--border); }
      #toolbar { gap: 8px; }
    }
  </style>
</head>
<body>

  <header id="header">
    <div class="logo">
      <div class="logo-icon">🥗</div>
      <div class="logo-text">
        <h1>Fridge<span>Chef</span></h1>
        <p>High-protein recipes from what you have</p>
      </div>
    </div>
    <span class="powered-badge">Powered by Groq</span>
  </header>

  <div id="toolbar">
    <div class="filter-group">
      <span class="filter-label">Dietary:</span>
      <button class="filter-btn" data-filter="vegan">🌱 Vegan</button>
      <button class="filter-btn" data-filter="gluten-free">🌾 Gluten-Free</button>
      <button class="filter-btn" data-filter="dairy-free">🥛 Dairy-Free</button>
    </div>
    <div class="calorie-group">
      <label class="calorie-label" for="calorie-goal">Daily cal goal</label>
      <input type="number" id="calorie-goal" class="calorie-input" placeholder="e.g. 2000" min="500" max="5000" step="50">
      <span class="calorie-unit">kcal</span>
    </div>
  </div>

  <div id="chat">
    <div id="welcome">
      <div class="welcome-icon">🥦</div>
      <h2>What's in your fridge?</h2>
      <p>List your ingredients and I'll build high-protein, high-fiber recipes around them. Try an example:</p>
      <div class="examples">
        <button class="example-chip" data-text="chicken breast, spinach, Greek yogurt, oats, eggs">chicken, spinach, Greek yogurt, oats, eggs</button>
        <button class="example-chip" data-text="canned tuna, chickpeas, tomatoes, cucumber, lemon">tuna, chickpeas, tomatoes, cucumber</button>
        <button class="example-chip" data-text="tofu, edamame, broccoli, soy sauce, brown rice">tofu, edamame, broccoli, brown rice</button>
        <button class="example-chip" data-text="ground beef, black beans, corn, bell peppers, cheese">ground beef, black beans, corn, bell peppers</button>
      </div>
    </div>
  </div>

  <div id="input-bar">
    <textarea id="user-input" placeholder="e.g. chicken breast, spinach, Greek yogurt, oats…" rows="1"></textarea>
    <button id="send-btn" title="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>

  <script>
    const state = { messages: [], isLoading: false, filters: new Set() };

    const chat      = document.getElementById('chat');
    const userInput = document.getElementById('user-input');
    const sendBtn   = document.getElementById('send-btn');

    // ── Dietary filter toggles ──
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const f = btn.dataset.filter;
        if (state.filters.has(f)) {
          state.filters.delete(f);
          btn.classList.remove('active');
        } else {
          state.filters.add(f);
          btn.classList.add('active');
        }
      });
    });

    // ── Helpers ──
    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function inline(text) {
      return escHtml(text)
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>');
    }

    function parseMarkdown(text) {
      const lines = text.split('\n');
      let html = '', inList = false, listType = null;

      const flushList = () => {
        if (inList) { html += `</${listType}>`; inList = false; listType = null; }
      };

      lines.forEach(line => {
        if (/^Macros per serving:/i.test(line)) {
          flushList();
          html += `<div class="macros-line">${escHtml(line)}</div>`;
          return;
        }
        if (/^[-*] /.test(line)) {
          if (!inList || listType !== 'ul') { flushList(); html += '<ul>'; inList = true; listType = 'ul'; }
          html += `<li>${inline(line.replace(/^[-*] /, ''))}</li>`;
          return;
        }
        if (/^\d+\. /.test(line)) {
          if (!inList || listType !== 'ol') { flushList(); html += '<ol>'; inList = true; listType = 'ol'; }
          html += `<li>${inline(line.replace(/^\d+\. /, ''))}</li>`;
          return;
        }
        flushList();
        if (line.trim() === '') return;
        html += `<p>${inline(line)}</p>`;
      });

      flushList();
      return html;
    }

    // ── Recipe Card Parsing ──
    function isRecipeResponse(text) {
      return /\*\*[^*]+\*\*\s*\(\d+\s+servings?\)/i.test(text) &&
             /\*\*Ingredients:\*\*/i.test(text) &&
             /Macros per serving:/i.test(text);
    }

    function parseMacros(str) {
      const macros = {};
      str.split('|').forEach(part => {
        const m = part.trim().match(/^(\w+):\s*(.+)/);
        if (m) macros[m[1].toLowerCase()] = m[2].trim();
      });
      return macros;
    }

    function parseRecipes(text) {
      const lines = text.split('\n');
      const recipes = [];
      const introLines = [];
      let cur = null;
      let section = null;

      for (const line of lines) {
        const titleMatch = line.match(/^\*\*(.+?)\*\*\s*\((\d+)\s+servings?\)/i);
        if (titleMatch) {
          if (cur) recipes.push(cur);
          cur = { name: titleMatch[1], servings: parseInt(titleMatch[2]), why: '', ingredients: [], instructions: [], macros: null };
          section = null;
          continue;
        }

        if (!cur) { introLines.push(line); continue; }

        const whyMatch = line.match(/^\*Why it fits your goals:\*\s*(.+)/i);
        if (whyMatch) { cur.why = whyMatch[1]; continue; }

        if (/^\*\*Ingredients:\*\*/i.test(line)) { section = 'ingredients'; continue; }
        if (/^\*\*Instructions:\*\*/i.test(line)) { section = 'instructions'; continue; }

        const macrosMatch = line.match(/^Macros per serving:\s*(.+)/i);
        if (macrosMatch) { cur.macros = parseMacros(macrosMatch[1]); continue; }

        if (section === 'ingredients') {
          const m = line.match(/^[-*]\s+(.+)/);
          if (m) cur.ingredients.push(m[1]);
        } else if (section === 'instructions') {
          const m = line.match(/^\d+\.\s+(.+)/);
          if (m) cur.instructions.push(m[1]);
        }
      }

      if (cur) recipes.push(cur);
      return { intro: introLines.join('\n').trim(), recipes };
    }

    function buildCopyText(recipe) {
      const lines = [
        `${recipe.name} (${recipe.servings} serving${recipe.servings !== 1 ? 's' : ''})`,
        recipe.why ? `Why: ${recipe.why}` : '',
        '',
        'INGREDIENTS:',
        ...recipe.ingredients.map(i => `- ${i}`),
        '',
        'INSTRUCTIONS:',
        ...recipe.instructions.map((s, i) => `${i + 1}. ${s}`),
      ];
      if (recipe.macros) {
        const m = recipe.macros;
        lines.push('', `Macros per serving: Calories: ${m.calories || '?'} | Protein: ${m.protein || '?'} | Fiber: ${m.fiber || '?'} | Carbs: ${m.carbs || '?'} | Fat: ${m.fat || '?'}`);
      }
      return lines.filter(l => l !== undefined).join('\n');
    }

    function makeMacroBar(macros) {
      if (!macros) return '';
      const pills = [
        macros.calories ? `<span class="macro-pill cal">🔥 ${macros.calories}</span>` : '',
        macros.protein  ? `<span class="macro-pill protein">💪 ${macros.protein} protein</span>` : '',
        macros.fiber    ? `<span class="macro-pill fiber">🌿 ${macros.fiber} fiber</span>` : '',
        macros.carbs    ? `<span class="macro-pill carbs">🌀 ${macros.carbs} carbs</span>` : '',
        macros.fat      ? `<span class="macro-pill fat">💧 ${macros.fat} fat</span>` : '',
      ].filter(Boolean).join('');
      return `<div class="macros-bar">${pills}</div>`;
    }

    function renderRecipeCard(recipe) {
      const card = document.createElement('div');
      card.className = 'recipe-card';

      const ingredientsHtml = recipe.ingredients.length
        ? `<ul>${recipe.ingredients.map(i => `<li>${escHtml(i)}</li>`).join('')}</ul>`
        : '<p style="color:var(--text-muted);font-size:13px">—</p>';

      const instructionsHtml = recipe.instructions.length
        ? `<ol>${recipe.instructions.map(s => `<li>${escHtml(s)}</li>`).join('')}</ol>`
        : '<p style="color:var(--text-muted);font-size:13px">—</p>';

      card.innerHTML = `
        <div class="recipe-card-header">
          <div class="recipe-title-block">
            <div class="recipe-name">${escHtml(recipe.name)}</div>
            <span class="recipe-servings">${recipe.servings} serving${recipe.servings !== 1 ? 's' : ''}</span>
          </div>
          <button class="copy-btn" title="Copy recipe">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            <span class="copy-label">Copy</span>
          </button>
        </div>
        ${recipe.why ? `<div class="recipe-why">${escHtml(recipe.why)}</div>` : ''}
        <div class="recipe-body">
          <div class="recipe-section">
            <h4>Ingredients</h4>
            ${ingredientsHtml}
          </div>
          <div class="recipe-section">
            <h4>Instructions</h4>
            ${instructionsHtml}
          </div>
        </div>
        ${makeMacroBar(recipe.macros)}
      `;

      const copyBtn = card.querySelector('.copy-btn');
      const copyLabel = card.querySelector('.copy-label');
      const copyText = buildCopyText(recipe);

      copyBtn.addEventListener('click', () => {
        const confirm = () => {
          copyBtn.classList.add('copied');
          copyLabel.textContent = 'Copied!';
          setTimeout(() => { copyBtn.classList.remove('copied'); copyLabel.textContent = 'Copy'; }, 1800);
        };
        if (navigator.clipboard?.writeText) {
          navigator.clipboard.writeText(copyText).then(confirm).catch(() => {
            // Fallback for non-HTTPS or restricted contexts
            const ta = document.createElement('textarea');
            ta.value = copyText;
            ta.style.position = 'fixed'; ta.style.opacity = '0';
            document.body.appendChild(ta); ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            confirm();
          });
        } else {
          const ta = document.createElement('textarea');
          ta.value = copyText;
          ta.style.position = 'fixed'; ta.style.opacity = '0';
          document.body.appendChild(ta); ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
          confirm();
        }
      });

      return card;
    }

    function renderRecipeResponse(text) {
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.remove();

      const { intro, recipes } = parseRecipes(text);
      const wrapper = document.createElement('div');
      wrapper.className = 'recipe-response';

      if (intro) {
        const introEl = document.createElement('p');
        introEl.className = 'recipe-intro';
        introEl.textContent = intro;
        wrapper.appendChild(introEl);
      }

      recipes.forEach(r => wrapper.appendChild(renderRecipeCard(r)));
      chat.appendChild(wrapper);
      chat.scrollTop = chat.scrollHeight;
    }

    // ── Message Rendering ──
    function renderMessage(role, content) {
      const welcome = document.getElementById('welcome');
      if (welcome) welcome.remove();

      if (role === 'assistant' && isRecipeResponse(content)) {
        renderRecipeResponse(content);
        return;
      }

      const wrapper = document.createElement('div');
      wrapper.className = `message ${role}`;
      const bubble = document.createElement('div');
      bubble.className = 'bubble';

      if (role === 'assistant') bubble.innerHTML = parseMarkdown(content);
      else bubble.textContent = content;

      wrapper.appendChild(bubble);
      chat.appendChild(wrapper);
      chat.scrollTop = chat.scrollHeight;
    }

    function showTyping() {
      const w = document.createElement('div');
      w.className = 'message assistant'; w.id = 'typing';
      const b = document.createElement('div');
      b.className = 'bubble typing-indicator';
      b.innerHTML = '<span></span><span></span><span></span>';
      w.appendChild(b); chat.appendChild(w);
      chat.scrollTop = chat.scrollHeight;
    }

    function removeTyping() {
      const t = document.getElementById('typing');
      if (t) t.remove();
    }

    function getErrorMessage(err) {
      if (!err?.status) return "Couldn't reach the server. Check your internet connection.";
      if (err.status === 429) return "Too many requests — wait a moment and try again.";
      if (err.status === 502) return "The AI provider returned an unexpected response. Please try again.";
      return `Something went wrong (${err.status}). Please try again in a moment.`;
    }

    async function callAPI() {
      const filters = Array.from(state.filters);
      const calorieGoalRaw = document.getElementById('calorie-goal').value;
      const calorieGoal = calorieGoalRaw ? parseInt(calorieGoalRaw) : null;

      const body = { messages: state.messages };
      if (filters.length > 0) body.filters = filters;
      if (calorieGoal && calorieGoal >= 500 && calorieGoal <= 5000) body.calorieGoal = calorieGoal;

      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (!res.ok) throw { status: res.status, data };
      const content = data?.choices?.[0]?.message?.content;
      if (!content) throw { status: 502, data };
      return content;
    }

    async function sendMessage(text) {
      if (state.isLoading) return;
      text = (text || userInput.value).trim();
      if (!text) return;

      userInput.value = '';
      autoResize();
      state.isLoading = true;
      sendBtn.disabled = true;

      renderMessage('user', text);
      state.messages.push({ role: 'user', content: text });
      showTyping();

      try {
        const reply = await callAPI();
        removeTyping();
        state.messages.push({ role: 'assistant', content: reply });
        renderMessage('assistant', reply);
      } catch (err) {
        removeTyping();
        renderMessage('error', getErrorMessage(err));
      } finally {
        state.isLoading = false;
        sendBtn.disabled = false;
        userInput.focus();
      }
    }

    function autoResize() {
      userInput.style.height = 'auto';
      userInput.style.height = Math.min(userInput.scrollHeight, 96) + 'px';
    }

    sendBtn.addEventListener('click', () => sendMessage());
    userInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    userInput.addEventListener('input', autoResize);
    document.querySelectorAll('.example-chip').forEach(chip => {
      chip.addEventListener('click', () => sendMessage(chip.dataset.text));
    });

    userInput.focus();
  </script>
</body>
</html>
